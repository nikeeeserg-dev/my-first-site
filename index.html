<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serhii Web</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#111,#333);
color:white;
text-align:center;
}

section{
padding:100px 20px;
}

h1{
font-size:55px;
margin-bottom:10px;
}

p{
font-size:22px;
color:#ddd;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#00c853;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
background:#00e676;
}
</style>
</head>

<body>

<section>
<h1>Сайти, що продають</h1>
<p>Лендінги • Візитки • Бізнес-сайти</p>
<button onclick="alert('Зв’яжіться зі мною 😎')">безкоштовна консультація</button>
</section>

</body>
</html>
